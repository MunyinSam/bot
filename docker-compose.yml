services:
  bot:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data       # persists bot.db across restarts
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - GUILD_ID=${GUILD_ID}
      - DATA_DIR=/app/data
      - FFMPEG_EXECUTABLE=ffmpeg
    env_file:
      - .env
