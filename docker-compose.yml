services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      - redis
    volumes:
      - ./data:/app/data       # persists bot.db across restarts
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - GUILD_ID=${GUILD_ID}
      - DATA_DIR=/app/data
      - FFMPEG_EXECUTABLE=ffmpeg
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
