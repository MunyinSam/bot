name: Deploy on Push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy env file
        run: cp /home/munyin/Prod/bot/.env $GITHUB_WORKSPACE/.env

      - name: Deploy with Docker Compose
        run: |
          docker compose down
          docker compose up --build -d
